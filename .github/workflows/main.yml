name: Collaborative Workflow

on:
  push:
    branches:
      - main

jobs:
  update_html_and_readme:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout the repository
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Step 2: Update index.html
      - name: Update HTML
        run: |
          echo "<p>Updated by benjaminhawa on $(date)</p>" >> index.html

      # Step 3: Update README
      - name: Update README
        run: |
          echo "### Updated by benjaminhawa on $(date '+%Y-%m-%d %H:%M:%S') [Commit: $(git rev-parse --short HEAD)]" >> README.md
